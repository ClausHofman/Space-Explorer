{% extends "base.html" %}

{% block title %}Add System{% endblock %}

{% block content %}
<h1>
    {% if mode == "edit" %}
        Edit System
    {% else %}
        Add New System
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

<button type="submit">
    {% if mode == "edit" %}
        Save Changes
    {% else %}
        Create System
    {% endif %}
</button>

</form>

{% endblock %}
