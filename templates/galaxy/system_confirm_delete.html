{% extends "base.html" %}

{% block title %}Delete System{% endblock %}

{% block content %}
<h1>Delete System</h1>

<p>Are you sure you want to delete "{{ system.name }}"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'system_detail' system.pk %}">
        <button type="button">Cancel</button>
    </a>
</form>

{% endblock %}
