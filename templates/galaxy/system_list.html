{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>Star Systems</h1>

    <div class="action-toggle">
        <span id="toggle-arrow">▶</span>
    </div>

    <div id="action-panel" class="hidden">
        <a href="{% url 'system_create' %}">
            <button>Add New System</button>
        </a>
    </div>
</div>

<ul>
    {% for system in systems %}
        <li>
            <a href="{% url 'system_detail' system.pk %}">{{ system.name }}</a>
        </li>
    {% empty %}
        <li>No systems found.</li>
    {% endfor %}
</ul>
{% endblock %}
