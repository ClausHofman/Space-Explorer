{% extends "base.html" %}

{% block title %}Systems{% endblock %}

{% block content %}
<h1>Star Systems</h1>

<ul>
    {% for system in systems %}
        <li>
            <a href="{% url 'system_detail' system.pk %}">{{ system.name }}</a>
        </li>
    {% empty %}
        <li>No systems found.</li>
    {% endfor %}
</ul>
{% endblock %}
