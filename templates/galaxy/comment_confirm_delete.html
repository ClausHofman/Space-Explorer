{% extends "base.html" %}

{% block title %}Delete Comment{% endblock %}

{% block content %}
<h1>Delete Comment</h1>

<p>Are you sure you want to delete this comment?</p>

<blockquote>{{ comment.text|linebreaksbr }}</blockquote>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="delete">Yes, delete</button>
    <a href="{{ target.get_absolute_url }}"><button type="button">Cancel</button></a>
</form>

{% endblock %}
