<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}Space Notes{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 900px;
        }
        header {
            margin-bottom: 30px;
        }
        header a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            margin-right: 15px;
        }
        h1, h2, h3 {
            margin-top: 25px;
        }
        button {
            padding: 6px 12px;
            background-color: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ddd;
        }

        /* Arrow toggle */
        .action-toggle {
            display: inline-block;
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            line-height: 1;
        }

        #action-panel {
            overflow: hidden;
            max-width: 0;
            transition: max-width 0.3s ease;
            display: inline-block;
            vertical-align: middle;
            white-space: nowrap;
        }

        #action-panel.open {
            max-width: 300px;
        }

        #toggle-arrow {
            transition: transform 0.3s ease;
        }

        #toggle-arrow.rotated {
            transform: rotate(90deg);
        }
        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h1 {
            margin: 0;
        }

        /*Delete button */
        button.delete {
            background-color: #f8d7da;
            border-color: #f5c2c7;
        }

        button.delete:hover {
            background-color: #f1b0b7;
        }


    </style>
</head>

<body>

<header>
</header>

{% block content %}
{% endblock %}

</body>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const arrow = document.getElementById("toggle-arrow");
    const panel = document.getElementById("action-panel");

    arrow.addEventListener("click", function() {
        panel.classList.toggle("open");
        arrow.classList.toggle("rotated");
    });
});
</script>

</html>
