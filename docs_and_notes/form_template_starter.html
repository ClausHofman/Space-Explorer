{% extends "base.html" %}

{% block title %}
    {% if mode == "edit" %}Edit Item{% else %}Add Item{% endif %}
{% endblock %}

{% block content %}
<h1>
    {% if mode == "edit" %}
        Edit Item
    {% else %}
        Add New Item
    {% endif %}
</h1>

<form method="post">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ cancel_url }}">
    {{ form.as_p }}

    <div class="form-actions">
        <a href="{{ cancel_url }}" class="button-link btn-secondary">Cancel</a>
        <button type="submit" class="btn-primary">
            {% if mode == "edit" %}
                Save Changes
            {% else %}
                Create Item
            {% endif %}
        </button>
    </div>
</form>
{% endblock %}
